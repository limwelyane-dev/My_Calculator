<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My_calculator</title>
    <link rel="stylesheet" href="calcu.css">
</head>
<body>
    <div class="calculator">
        <input type="text" placeholder="0" readonly id="inputBox">

        <div class="btn">
            <button class="reset_del">AC</button>
            <button class="reset_del">DEL</button>
            <button class="operator">%</button>
            <button class="operator">/</button>
        </div>
        <div class="btn">
            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="operator">*</button>
        </div>
        <div class="btn">
            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="operator">-</button>
        </div>
        <div class="btn">
            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="operator">+</button>
        </div>
        <div class="btn">
            <button class="number">00</button>
            <button class="number">0</button>
            <button class="number">.</button>
            <button class="operator">=</button>
        </div>
    </div>
    <div class="history" style="display: none;">
        <div class="forHistory">
            <h2>History</h2>
            <button id="clearHistory">Clear History</button>
        </div>
        
        <ul id="historyList"></ul>

    </div>
    <script src="calcu.js"></script>
</body>
</html>
